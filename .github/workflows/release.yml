name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify assets
        run: |
          test -f main.js
          test -f manifest.json
          test -f styles.css

      - name: Create zip
        run: |
          python - <<'PY'
          import os, zipfile
          tag = os.environ.get("GITHUB_REF_NAME", "release")
          out = f"obsidian-r2-upload-{tag}.zip"
          files = ["main.js", "manifest.json", "styles.css"]
          with zipfile.ZipFile(out, "w", compression=zipfile.ZIP_DEFLATED) as z:
            for f in files:
              z.write(f, arcname=os.path.basename(f))
          print("created", out)
          PY

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            obsidian-r2-upload-${{ github.ref_name }}.zip

